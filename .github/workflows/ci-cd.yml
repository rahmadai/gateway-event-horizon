# CI/CD Pipeline for Gateway Event Horizon
# Demonstrates production-grade testing, security scanning, and deployment

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: gateway-event-horizon

jobs:
  # ----------------------
  # Lint and Security Scan
  # ----------------------
  lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          pip install flake8 black isort bandit safety

      - name: Code formatting check
        run: |
          black --check services/ shared/
          isort --check-only services/ shared/

      - name: Lint with flake8
        run: |
          flake8 services/ shared/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 services/ shared/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Security scan with Bandit
        run: |
          bandit -r services/ shared/ -f json -o bandit-report.json || true
          bandit -r services/ shared/

      - name: Dependency vulnerability scan
        run: |
          safety check -r services/gateway/requirements.txt || true

  # ----------------------
  # Unit Tests
  # ----------------------
  unit-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: test_job_matching
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r services/job-matching/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: rootpassword
          DB_NAME: test_job_matching
          REDIS_URL: redis://localhost:6379
        run: |
          pytest services/job-matching/tests -v --cov=services/job-matching/src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ----------------------
  # Integration Tests
  # ----------------------
  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services with Docker Compose
        run: |
          docker-compose -f docker-compose.yml -f docker-compose.test.yml up -d --build
          sleep 30  # Wait for services to be ready

      - name: Run integration tests
        run: |
          # Wait for health checks
          docker-compose ps
          # Run Newman/Postman tests or custom integration tests
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost:8001/health || exit 1

      - name: Run load tests
        run: |
          pip install locust
          locust -f tests/load/locustfile.py --headless -u 100 -r 10 --run-time 1m || true

      - name: Cleanup
        if: always()
        run: docker-compose down -v

  # ----------------------
  # Build and Push Images
  # ----------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint-and-security, unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [gateway, job-matching]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'

  # ----------------------
  # Deploy to Staging
  # ----------------------
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-and-push, integration-tests]
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          # kubectl apply -f infrastructure/k8s/staging/
          # helm upgrade --install gateway-event-horizon infrastructure/helm/ --values infrastructure/helm/values-staging.yaml

      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://staging-api.example.com/health || exit 1

  # ----------------------
  # Deploy to Production
  # ----------------------
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-push, integration-tests]
    if: github.ref == 'refs/heads/main'
    environment: production  # Requires manual approval

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Deploy to Production (Canary)
        run: |
          echo "Deploying to production with canary strategy..."
          # kubectl apply -f infrastructure/k8s/production/
          # kubectl set image deployment/gateway gateway=${{ env.REGISTRY }}/${{ github.repository }}/gateway:${{ github.sha }}

      - name: Verify deployment
        run: |
          sleep 60
          # kubectl rollout status deployment/gateway
          curl -f https://api.example.com/health || exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, initiating rollback..."
          # kubectl rollout undo deployment/gateway
