apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-matching
  namespace: gateway-event-horizon
  labels:
    app: job-matching
spec:
  replicas: 2
  selector:
    matchLabels:
      app: job-matching
  template:
    metadata:
      labels:
        app: job-matching
    spec:
      containers:
        - name: job-matching
          image: gateway-event-horizon-job-matching:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: job-matching
  namespace: gateway-event-horizon
spec:
  selector:
    app: job-matching
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
